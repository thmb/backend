name: Deploy to AWS Lambda

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "backend"
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.ecr.outputs.registry }}/raio-storage-backend:${{ steps.version.outputs.version }}
      version: ${{ steps.version.outputs.version }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Get version from pyproject.toml
      id: version
      run: |
        PROJECT=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
        COMMIT=$(git rev-parse --short HEAD)
        VERSION="${PROJECT}-${COMMIT}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📦 Version: $VERSION"

    - name: Configure AWS credentials
      id: aws
      uses: aws-actions/configure-aws-credentials@v5
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: sa-east-1

    - name: Login to Amazon ECR
      id: ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build Docker Image
      env:
        ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        ECR_REPOSITORY: raio-storage-backend
        IMAGE_TAG: ${{ steps.version.outputs.version }}
      run: |
        echo "Building Docker image..."
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        echo "Image built successfully: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

    - name: Push Image to ECR
      env:
        ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        ECR_REPOSITORY: raio-storage-backend
        IMAGE_TAG: ${{ steps.version.outputs.version }}
      run: |
        echo "Pushing image to ECR..."
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        echo "Image URI: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"


  validate-plan-apply:
    name: Validate Plan Apply
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v5
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: sa-east-1

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.14.0"

    - name: Terraform Init
      id: init
      run: terraform init

    - name: Terraform Validate
      id: validate
      run: terraform validate

    - name: Terraform Plan
      id: plan
      run: terraform plan -no-color -out=tfplan

    - name: Terraform Apply
      id: apply
      run: terraform apply -auto-approve tfplan


  release-and-summary:
    name: Create GitHub Release and Summary
    runs-on: ubuntu-latest
    needs: 
      - build-and-push
      - validate-plan-apply

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create Release Tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use generated version from build job
          VERSION="${{ needs.build-and-push.outputs.version }}"

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Check if tag already exists
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "⚠️  Tag $VERSION already exists, skipping release creation"
            exit 0
          fi

          # Create tag
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

          # Get commit message
          MESSAGE=$(git log -1 --pretty=%B)

          # Create release
          gh release create "$VERSION" \
            --title "🚀 Release $VERSION" \
            --notes "## Backend API $VERSION

          ### 📦 Docker Image
          - \`${{ needs.build-and-push.outputs.image }}\`

          ### 🔧 Lambda Function
          - **Function**: \`raio-backend\`
          - **Region**: \`sa-east-1\`
          - **API**: [View Function URL](https://console.aws.amazon.com/lambda/home?region=sa-east-1#/functions/raio-backend)

          ### 📌 Version
          - \`${{ needs.build-and-push.outputs.version }}\`

          ### 📝 Changes
          \`\`\`
          $MESSAGE
          \`\`\`

          ### 👤 Deployment Info
          - **Developer**: @${{ github.actor }}
          - **Workflow**: [View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - **Commit**: [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"

      - name: Deployment summary
        run: |
          echo "✅ Deployment completed successfully!"
          echo ""
          echo "📦 Docker Image:"
          echo "   - ${{ needs.build-and-push.outputs.image }}"
          echo ""
          echo "🏷️  Version: ${{ needs.build-and-push.outputs.version }}"
          echo "🔧 Function: raio-backend"
          echo "🌎 Region: sa-east-1"
          echo "👤 Developer: ${{ github.actor }}"
          echo "📝 Commit: ${{ github.sha }}"
          echo ""
          echo "🔗 View logs: aws logs tail /aws/lambda/raio-backend --follow --region sa-east-1"
